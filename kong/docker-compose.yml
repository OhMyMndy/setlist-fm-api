services:
  kong:
    image: kong/kong-gateway:3.9.0.1-debian
    restart: unless-stopped
    ports:
      - "8008:8000"   # Proxy
      - "8443:8443"   # Proxy SSL
#      - "8001:8001"   # Admin API
#      - "8444:8444"   # Admin API SSL
    volumes:
      - ./kong-cache.yml:/usr/local/kong/declarative/kong.yml
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: "/usr/local/kong/declarative/kong-cache.yml"
      KONG_PROXY_ACCESS_LOG: "/dev/stdout"
      KONG_ADMIN_ACCESS_LOG: "/dev/stdout"
      KONG_PROXY_ERROR_LOG: "/dev/stderr"
      KONG_ADMIN_ERROR_LOG: "/dev/stderr"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001, 0.0.0.0:8444 ssl"
      KONG_PROXY_LISTEN: "0.0.0.0:8000, 0.0.0.0:8443 ssl"

  kong-mock:
    image: kong/kong-gateway:3.9.0.1-debian
    restart: unless-stopped
    ports:
      - "8009:8000"   # Proxy
      - "8444:8443"   # Proxy SSL
    #      - "8001:8001"   # Admin API
    #      - "8444:8444"   # Admin API SSL
    volumes:
      - ./kong-mock.yml:/usr/local/kong/declarative/kong.yml
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: "/usr/local/kong/declarative/kong-cache.yml"
      KONG_PROXY_ACCESS_LOG: "/dev/stdout"
      KONG_ADMIN_ACCESS_LOG: "/dev/stdout"
      KONG_PROXY_ERROR_LOG: "/dev/stderr"
      KONG_ADMIN_ERROR_LOG: "/dev/stderr"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001, 0.0.0.0:8444 ssl"
      KONG_PROXY_LISTEN: "0.0.0.0:8000, 0.0.0.0:8443 ssl"

